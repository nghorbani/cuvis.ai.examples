defaults:
  - model: efficientad/medium
  - dataset: efficientad
  - runner: lightning
  - eval: default
  - logging: tensorboard

work_dir: ${oc.env:WORK_DIR, ./work_dirs/exp}
seed: 42

trainer:
  max_epochs: 1
  accelerator: cpu

dataloader:
  batch_size: 1
  num_workers: 2

datasets:
  train: ${dataset.train}
  val: ${dataset.val}
