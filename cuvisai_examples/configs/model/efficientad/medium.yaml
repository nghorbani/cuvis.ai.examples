type: efficientad.MediumLightning
params:
  backbones_type: efficientad.MediumBackbones
  in_channels: 6
  teacher_checkpoint: null  # REQUIRED: Path to pretrained teacher weights (e.g., "best_teacher_6_channel.pth")
  backbones_params:
    padding: true
  learning_rate: 0.0001
  weight_decay: 0.00001
  use_imgNet_penalty: false
  loss:
    st_weight: 1.0
    ae_weight: 1.0
    imgnet_penalty_weight: 0.0
  preprocessing:
    compute_teacher_stats: true
    compute_percentile_quantiles: true
